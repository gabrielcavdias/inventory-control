services:
  nginx:
    image: nginx:alpine
    ports:
      - "8010:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx:/etc/nginx/conf.d
    depends_on:
      - api
    networks:
      - app

  api:
    build:
      context: ./backend
    volumes:
      - ./backend:/var/www
    networks:
      - app

  front:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - app

networks:
  app:
    driver: bridge